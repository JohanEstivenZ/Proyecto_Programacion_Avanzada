# ===================================================
# Perfil activo — se lee del .env o usa "dev" por defecto
# ===================================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===================================================
# Servidor
# ===================================================
server.port=8080
server.servlet.context-path=/api/v1

# ===================================================
# JWT
# ===================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ===================================================
# Spring AI — OpenAI
# ===================================================
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-dummy}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.3

# ===================================================
# Proveedor de IA
# ===================================================
ia.provider=${IA_PROVIDER:fallback}

# ===================================================
# Swagger
# ===================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===================================================
# Logging
# ===================================================
logging.level.co.edu.uniquindio.taskflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
